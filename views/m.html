<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi E-Commerce</title>  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head> 

<body class="bg-light"> 
 
    <!-- Barra de Navegación --> 
    <nav class="navbar navbar-dark bg-dark"> 
        <div class="container-fluid"> 
            <span class="navbar-brand mb-0 h1">NeoData Shop</span> 
            <button class="btn btn-outline-light"> 
                Carrito (<span id="cart-count">0</span>) 
            </button> 
        </div> 
    </nav> 
 
    <!-- Contenedor Principal --> 
    <div class="container w-75 mt-5 mx-auto" id="app"> 
        <h2 class = "display-5 fw-bold fs-4 text-center mb-5">Productos</h2> 
        <div id="productos-container" class="row g-4 justify-content-center">

<!-- iPhone card -->     

<div class="col-md-3">
    <div class="card h-100 shadow-sm border-0 shadow">
        
        <div class="ratio ratio-4x3 p-3">
            <img src="./img/iphone16.png" 
                 class="card-img-top object-fit-contain" 
                 alt="Celular iPhone 16 Pro Max">
        </div>

        <div class="card-body d-flex flex-column shadow">
            <div>
                <span class="badge bg-danger mb-2 small fs-7">10% OFF</span>
            </div>
            
            <h5 class="fs-6 fw-semibold text-dark mb-1 mt-1">iPhone 16 Pro Max</h5>
            
            <p class="card-text text-primary fw-bold fs-5 mb-auto">$1.123.500</p>

            <div class="mt-3">
                <label class="form-label small fw-bold text-secondary mb-1">Cantidad:</label>
                
                <input type="number" class="form-control form-control-sm mb-3" value="1" min="1">
                
                <button class="btn btn-success w-100 fw-bold py-2 shadow-sm">
                    <i class="bi bi-cart-plus"></i> Agregar al Carrito
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Auriculares Sony card -->

<div class="col-md-3">
    <div class="card h-100 shadow-sm border-0 shadow">
        
        <div class="ratio ratio-4x3 p-3">
            <img src="./img/Sony WH-1000XM5.png" 
                 class="card-img-top object-fit-contain" 
                 alt="Auriculares Sony WH-1000XM5">
        </div>

        <div class="card-body d-flex flex-column shadow">
            <div>
                <span class="badge bg-danger mb-2 small fs-7">15% OFF</span>
            </div>
            
            <h5 class="fs-6 fw-semibold text-dark mb-1 mt-1">Auriculares Sony WH-1000XM5</h5>
            
            <p class="card-text text-primary fw-bold fs-5 mb-auto">$69.999</p>

            <div class="mt-3">
                <label class="form-label small fw-bold text-secondary mb-1">Cantidad:</label>
                
                <input type="number" class="form-control form-control-sm mb-3" value="1" min="1">
                
                <button class="btn btn-success w-100 fw-bold py-2 shadow-sm">
                    <i class="bi bi-cart-plus"></i> Agregar al Carrito
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Smartwatch card --> 

<div class="col-md-3">
    <div class="card h-100 shadow-sm border-0 shadow">
        
        <div class="ratio ratio-4x3 p-3">
            <img src="./img/smartwatch.png" 
                 class="card-img-top object-fit-contain" 
                 alt="Smartwatch">
        </div>

        <div class="card-body d-flex flex-column shadow">
            <div>
                <span class="badge text-bg-primary fs-7">Nuevo</span>
            </div>
            
            <h5 class="fs-6 fw-semibold text-dark mt-2">Smartwatch JD Venecia Sport</h5>
            
            <p class="card-text text-primary fw-bold fs-5 mb-auto">$36.999</p>

            <div class="mt-3">
                <label class="form-label small fw-bold text-secondary mb-1">Cantidad:</label>
                
                <input type="number" class="form-control form-control-sm mb-3" value="1" min="1">
                
                <button class="btn btn-success w-100 fw-bold py-2 shadow-sm">
                    <i class="bi bi-cart-plus"></i> Agregar al Carrito
                </button>
            </div>
        </div>
    </div>
</div>

</div>
    </div> 
</body> 

</html>
